<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ökukennsla">
<title>Ökukennsla – Tímaskráning</title>
<link rel="manifest" id="manifest-link">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#e0e0e0;--border2:#ccc;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green:#0F6E56;--green-bg:#E1F5EE;--green-text:#085041;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#791F1F;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-text:#633806;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f0f0f0;--text2:#aaa;--text3:#777;
    --border:#3a3a3c;--border2:#555;
    --blue:#378ADD;--blue-bg:#0c2a44;--blue-text:#85B7EB;
    --green:#1D9E75;--green-bg:#083828;--green-text:#5DCAA5;
    --red:#E24B4A;--red-bg:#3d1010;--red-text:#F09595;
    --amber:#EF9F27;--amber-bg:#3d2800;--amber-text:#FAC775;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;max-width:600px;margin:0 auto;min-height:100vh}
.app{padding:0 0 80px}
header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
header .logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
header .logo svg{width:18px;height:18px;fill:white}
header h1{font-size:17px;font-weight:600;color:var(--text)}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));max-width:600px;margin:0 auto;z-index:50}
.nav-bottom{left:50%;transform:translateX(-50%);width:100%;max-width:600px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:inherit}
.nav-item.active{color:var(--blue)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6}
.page{display:none;padding:16px}
.page.active{display:block}
.section-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.metric-card{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.metric-val{font-size:26px;font-weight:700;color:var(--text)}
.metric-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border:1px solid var(--border2);border-radius:var(--radius);background:none;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit;font-weight:500}
.btn:active{opacity:0.7}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-success{background:var(--green);border-color:var(--green);color:#fff}
.btn-danger{background:var(--red-bg);border-color:var(--red-bg);color:var(--red-text)}
.btn-sms{background:var(--green-bg);border-color:var(--green-bg);color:var(--green-text)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-full{width:100%}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.avatar{border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue-text);flex-shrink:0}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.student-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.student-row:last-child{border-bottom:none}
.slot-item{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
input,select,textarea{width:100%;font-family:inherit;font-size:15px;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty{text-align:center;color:var(--text2);padding:40px 20px;font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.week-scroll{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.week-day-lbl{text-align:center;font-size:10px;color:var(--text2);padding:4px 0;font-weight:600}
.week-cell{min-height:58px;border:1px solid var(--border);border-radius:6px;padding:3px;font-size:9px;overflow:hidden}
.week-cell.today{border-color:var(--blue);border-width:2px}
.cal-ev{background:var(--blue-bg);color:var(--blue-text);border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.cal-ev.done{background:var(--green-bg);color:var(--green-text)}
.upcoming-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.upcoming-item:last-child{border-bottom:none}
.sms-preview{background:var(--bg2);border-radius:var(--radius);padding:12px;font-size:13px;color:var(--text2);margin:8px 0;line-height:1.6;border:1px solid var(--border)}
.checkbox-row{display:flex;align-items:center;gap:10px}
.checkbox-row input[type=checkbox]{width:auto;width:20px;height:20px}
.checkbox-row label{margin:0;color:var(--text)}
a.btn{text-decoration:none}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M3 17l1-6h16l1 6M5 17v2h2v-2M17 17v2h2v-2M7 11V7a5 5 0 0110 0v4"/></svg>
  </div>
  <h1>Ökukennsla</h1>
</header>

<div id="page-yfirlit" class="page active">
  <div class="metric-grid">
    <div class="metric-card"><div class="metric-val" id="m-nem">0</div><div class="metric-lbl">Nemendur</div></div>
    <div class="metric-card"><div class="metric-val" id="m-day">0</div><div class="metric-lbl">Í dag</div></div>
    <div class="metric-card"><div class="metric-val" id="m-week">0</div><div class="metric-lbl">Í viku</div></div>
  </div>
  <div class="section-title">Þessi vika</div>
  <div class="week-scroll" id="week-days"></div>
  <div class="week-scroll" id="week-cells"></div>
  <div style="margin-top:20px">
    <div class="section-title">Næstu tímar</div>
    <div id="upcoming"></div>
  </div>
</div>

<div id="page-nemendur" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin:0">Nemendur</div>
    <button class="btn btn-primary btn-sm" onclick="openAddStudent()">+ Nýr</button>
  </div>
  <div class="card" style="padding:0 16px"><div id="student-list"><div class="empty">Engir nemendur skráðir</div></div></div>
</div>

<div id="page-timar" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin:0">Tímar</div>
    <button class="btn btn-primary btn-sm" onclick="openAddSlot()">+ Skrá tíma</button>
  </div>
  <div id="timar-list"></div>
</div>

<div id="page-sms" class="page">
  <div class="section-title">Senda SMS</div>
  <div class="card">
    <div class="form-group"><label>Nemandi</label><select id="sms-st" onchange="updateSms()"><option value="">– Veldu –</option></select></div>
    <div class="form-group"><label>Tími</label><select id="sms-slot" onchange="updateSmsPreview()"><option value="">– Veldu fyrst nemanda –</option></select></div>
    <div class="form-group"><label>Sniðmát</label>
      <select id="sms-tmpl" onchange="updateSmsPreview()">
        <option value="standard">Staðlað – minna á tíma</option>
        <option value="daginn_fyrir">Daginn fyrir</option>
        <option value="sama_dag">Sama daginn</option>
        <option value="custom">Sérsniðið</option>
      </select>
    </div>
    <div class="form-group" id="custom-grp" style="display:none">
      <label>Skilaboð</label>
      <textarea id="custom-txt" rows="3" oninput="updateSmsPreview()"></textarea>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600">Forskoðun</div>
    <div class="sms-preview" id="sms-prev">Veldu nemanda og tíma...</div>
    <button class="btn btn-sms btn-full" style="margin-top:12px" onclick="sendSmsNow()" id="sms-btn" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M14 2L2 7l5 2 2 5 5-12z" stroke-linejoin="round"/></svg>
      Opna SMS forrit
    </button>
  </div>
  <div class="section-title" style="margin-top:8px">Tímar í dag</div>
  <div id="bulk-sms"></div>
</div>

<div id="page-export" class="page">
  <div class="section-title">Export</div>
  <div class="card">
    <div class="form-group"><label>Nemandi</label><select id="exp-st"><option value="">Allir</option></select></div>
    <div class="form-row">
      <div class="form-group"><label>Frá</label><input type="date" id="exp-from"></div>
      <div class="form-group"><label>Til</label><input type="date" id="exp-to"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="doExport()">Sýna yfirlit</button>
  </div>
  <div id="exp-result"></div>
</div>
</div>

<nav class="nav-bottom">
  <button class="nav-item active" onclick="showPage('yfirlit',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Yfirlit
  </button>
  <button class="nav-item" onclick="showPage('nemendur',this)">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/><path d="M19 8v6M22 11h-6"/></svg>
    Nemendur
  </button>
  <button class="nav-item" onclick="showPage('timar',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Tímar
  </button>
  <button class="nav-item" onclick="showPage('sms',this)">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    SMS
  </button>
  <button class="nav-item" onclick="showPage('export',this)">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
</nav>

<div id="modal-root"></div>

<script>
const TYPES=['Þjóðvegur','Þorp/götur','Bílastæði/snúningur','Þéttbýli','Kvöldakstur','Fræðsla'];
const REQ=1400;
let db={students:[],slots:[]};

function save(){try{localStorage.setItem('okukennari',JSON.stringify(db))}catch(e){}}
function load(){try{const d=localStorage.getItem('okukennari');if(d)db=JSON.parse(d)}catch(e){}}
load();

const initials=n=>n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtD=d=>new Date(d).toLocaleDateString('is-IS',{weekday:'short',month:'short',day:'numeric'});
const fmtDLong=d=>new Date(d).toLocaleDateString('is-IS',{weekday:'long',month:'long',day:'numeric'});
function weekStart(){const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7));return d;}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  if(p==='yfirlit')renderYfirlit();
  if(p==='nemendur')renderNemendur();
  if(p==='timar')renderTimar();
  if(p==='sms')renderSms();
  if(p==='export')renderExport();
}

function renderYfirlit(){
  const today=todayStr();
  document.getElementById('m-nem').textContent=db.students.length;
  document.getElementById('m-day').textContent=db.slots.filter(s=>s.date===today).length;
  const ws=weekStart(),we=new Date(ws);we.setDate(we.getDate()+6);
  document.getElementById('m-week').textContent=db.slots.filter(s=>{const d=new Date(s.date);return d>=ws&&d<=we}).length;

  const days=['Mán','Þri','Mið','Fim','Fös','Lau','Sun'];
  const dEl=document.getElementById('week-days'),cEl=document.getElementById('week-cells');
  dEl.innerHTML='';cEl.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    dEl.innerHTML+=`<div class="week-day-lbl">${days[i]}<br>${d.getDate()}</div>`;
    const sl=db.slots.filter(s=>s.date===ds);
    cEl.innerHTML+=`<div class="week-cell${ds===today?' today':''}">${sl.map(s=>{const st=db.students.find(x=>x.id===s.studentId);return`<div class="cal-ev${s.done?' done':''}">${s.time.slice(0,5)} ${st?st.name.split(' ')[0]:''}</div>`;}).join('')}</div>`;
  }

  const now=new Date();
  const up=db.slots.filter(s=>!s.done&&new Date(s.date+'T'+s.time)>=now).sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time)).slice(0,6);
  const ul=document.getElementById('upcoming');
  if(!up.length){ul.innerHTML='<div class="empty">Engir fyrirliggjandi tímar</div>';return;}
  ul.innerHTML=up.map(s=>{
    const st=db.students.find(x=>x.id===s.studentId);
    const tel=st&&st.tel?st.tel.replace(/[\s-]/g,''):'';
    const msg=st?buildMsg(st,s,'standard'):'';
    return`<div class="upcoming-item">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${st?st.name:'?'}</div>
        <div style="font-size:12px;color:var(--text2)">${fmtD(s.date)} kl. ${s.time} · ${s.type}</div>
      </div>
      ${tel?`<a href="sms:${tel}?body=${encodeURIComponent(msg)}" class="btn btn-sms btn-sm" style="text-decoration:none;white-space:nowrap">SMS</a>`:''}
    </div>`;
  }).join('');
}

function renderNemendur(){
  const el=document.getElementById('student-list');
  if(!db.students.length){el.innerHTML='<div class="empty">Engir nemendur skráðir</div>';return;}
  el.innerHTML=db.students.map(st=>{
    const mins=db.slots.filter(s=>s.studentId===st.id&&s.done).reduce((a,s)=>a+s.duration,0);
    const pct=Math.min(100,Math.round(mins/REQ*100));
    return`<div class="student-row">
      <div class="avatar" style="width:40px;height:40px">${initials(st.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px">${st.name} ${mins>=REQ?'<span class="badge badge-green">Lokið</span>':''}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:5px">${mins}/${REQ} mín (${pct}%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="openDetail('${st.id}')">Skoða</button>
        <button class="btn btn-danger btn-sm" onclick="delStudent('${st.id}')">X</button>
      </div>
    </div>`;
  }).join('');
}

function renderTimar(){
  const el=document.getElementById('timar-list');
  const sorted=[...db.slots].sort((a,b)=>new Date(b.date+'T'+b.time)-new Date(a.date+'T'+a.time));
  if(!sorted.length){el.innerHTML='<div class="empty">Engir tímar skráðir</div>';return;}
  el.innerHTML=sorted.map(s=>{
    const st=db.students.find(x=>x.id===s.studentId);
    const tel=st&&st.tel?st.tel.replace(/[\s-]/g,''):'';
    const msg=st?buildMsg(st,s,'standard'):'';
    return`<div class="slot-item">
      <span class="badge ${s.done?'badge-green':'badge-blue'}">${s.done?'Lokið':'Fyrirhugað'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${fmtD(s.date)} kl. ${s.time}</div>
        <div style="font-size:12px;color:var(--text2)">${st?st.name:'?'} · ${s.type} · ${s.duration} mín</div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        ${!s.done&&tel?`<a href="sms:${tel}?body=${encodeURIComponent(msg)}" class="btn btn-sms btn-sm" style="text-decoration:none">SMS</a>`:''}
        ${!s.done?`<button class="btn btn-sm" style="color:var(--green)" onclick="markDone('${s.id}')">✓</button>`:''}
        <button class="btn btn-danger btn-sm" onclick="delSlot('${s.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderSms(){
  const sel=document.getElementById('sms-st');
  const stWithTel=db.students.filter(s=>s.tel);
  sel.innerHTML='<option value="">– Veldu –</option>'+stWithTel.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if(!stWithTel.length)sel.innerHTML='<option value="">Engir nemendur með símanúmer</option>';
  renderBulkSms();
  renderExport();
}

function updateSms(){
  const sid=document.getElementById('sms-st').value;
  const slotSel=document.getElementById('sms-slot');
  const now=new Date();
  if(sid){
    const up=db.slots.filter(s=>s.studentId===sid&&!s.done&&new Date(s.date+'T'+s.time)>=now).sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time));
    slotSel.innerHTML=up.length?up.map(s=>`<option value="${s.id}">${fmtD(s.date)} kl. ${s.time} – ${s.type}</option>`).join(''):'<option value="">Engir fyrirhugaðir tímar</option>';
  }else slotSel.innerHTML='<option value="">– Veldu fyrst nemanda –</option>';
  updateSmsPreview();
}

function updateSmsPreview(){
  const sid=document.getElementById('sms-st').value;
  const slotId=document.getElementById('sms-slot').value;
  const tmpl=document.getElementById('sms-tmpl').value;
  document.getElementById('custom-grp').style.display=tmpl==='custom'?'block':'none';
  const st=db.students.find(x=>x.id===sid);
  const slot=db.slots.find(x=>x.id===slotId);
  const prev=document.getElementById('sms-prev');
  const btn=document.getElementById('sms-btn');
  if(!st||!slot){prev.textContent='Veldu nemanda og tíma...';btn.disabled=true;return;}
  const msg=buildMsg(st,slot,tmpl);
  prev.textContent=msg;
  btn.disabled=!st.tel;
  if(!st.tel)prev.textContent+='\n⚠️ Ekkert símanúmer skráð á þennan nemanda';
}

function buildMsg(st,slot,tmpl){
  const date=fmtDLong(slot.date);
  if(tmpl==='custom')return document.getElementById('custom-txt')?.value||'';
  if(tmpl==='daginn_fyrir')return`Góðan dag ${st.name}! Á morgun, ${date} kl. ${slot.time}, er ökutíminn þinn (${slot.type}). Gleymdu ekki! Við sjáumst.`;
  if(tmpl==='sama_dag')return`Góðan daginn ${st.name}! Í dag kl. ${slot.time} er ökutíminn þinn (${slot.type}). Vertu tilbúin/n!`;
  return`Halló ${st.name}! Minnir þig á ökutíma ${date} kl. ${slot.time} (${slot.type}). Sjáumst þá!`;
}

function sendSmsNow(){
  const sid=document.getElementById('sms-st').value;
  const slotId=document.getElementById('sms-slot').value;
  const tmpl=document.getElementById('sms-tmpl').value;
  const st=db.students.find(x=>x.id===sid);
  const slot=db.slots.find(x=>x.id===slotId);
  if(!st||!slot||!st.tel)return;
  const tel=st.tel.replace(/[\s-]/g,'');
  window.location.href=`sms:${tel}?body=${encodeURIComponent(buildMsg(st,slot,tmpl))}`;
}

function renderBulkSms(){
  const today=todayStr();
  const sl=db.slots.filter(s=>s.date===today&&!s.done);
  const el=document.getElementById('bulk-sms');
  if(!sl.length){el.innerHTML='<div class="empty" style="padding:20px">Engir tímar í dag</div>';return;}
  el.innerHTML=sl.map(s=>{
    const st=db.students.find(x=>x.id===s.studentId);
    const tel=st&&st.tel?st.tel.replace(/[\s-]/g,''):'';
    const msg=st?buildMsg(st,s,'sama_dag'):'';
    return`<div class="slot-item">
      <div style="flex:1"><div style="font-weight:600;font-size:14px">${st?st.name:'?'}</div><div style="font-size:12px;color:var(--text2)">${s.time} · ${s.type}</div></div>
      ${tel?`<a href="sms:${tel}?body=${encodeURIComponent(msg)}" class="btn btn-sms btn-sm" style="text-decoration:none">Senda SMS</a>`:'<span style="font-size:11px;color:var(--text3)">Ekkert nr.</span>'}
    </div>`;
  }).join('');
}

function renderExport(){
  const sel=document.getElementById('exp-st');
  if(sel)sel.innerHTML='<option value="">Allir</option>'+db.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function doExport(){
  const sid=document.getElementById('exp-st').value;
  const from=document.getElementById('exp-from').value;
  const to=document.getElementById('exp-to').value;
  let slots=db.slots.filter(s=>s.done);
  if(sid)slots=slots.filter(s=>s.studentId===sid);
  if(from)slots=slots.filter(s=>s.date>=from);
  if(to)slots=slots.filter(s=>s.date<=to);
  const el=document.getElementById('exp-result');
  if(!slots.length){el.innerHTML='<div class="empty">Engar niðurstöður</div>';return;}
  const by={};
  slots.forEach(s=>{if(!by[s.studentId])by[s.studentId]={mins:0,count:0,types:{}};by[s.studentId].mins+=s.duration;by[s.studentId].count++;by[s.studentId].types[s.type]=(by[s.studentId].types[s.type]||0)+s.duration;});
  let txt='';
  Object.entries(by).forEach(([id,d])=>{const st=db.students.find(x=>x.id===id);txt+=`${st?st.name:id}\nFjöldi: ${d.count} tímar · ${d.mins} mínútur\n`;Object.entries(d.types).forEach(([t,m])=>txt+=`  ${t}: ${m} mín\n`);txt+='\n';});
  window._exp=txt;
  el.innerHTML=`<div class="card"><pre style="font-size:12px;white-space:pre-wrap;color:var(--text2);font-family:monospace">${txt}</pre><button class="btn btn-full" style="margin-top:10px" onclick="navigator.clipboard.writeText(window._exp).then(()=>alert('Afritað!'))">Afrita</button></div>`;
}

function openModal(html){document.getElementById('modal-root').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function openAddStudent(){
  openModal(`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nýr nemandi</div>
    <div class="form-group"><label>Nafn *</label><input id="ns-n" type="text" placeholder="Jón Jónsson" autofocus></div>
    <div class="form-group"><label>Símanúmer <span style="color:var(--green);font-size:11px">(þarf fyrir SMS)</span></label><input id="ns-t" type="tel" placeholder="555-1234"></div>
    <div class="form-group"><label>Kennitala (valfrjálst)</label><input id="ns-k" type="text" placeholder="000000-0000"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
      <button class="btn" onclick="closeModal()">Hætta við</button>
      <button class="btn btn-primary" onclick="saveStudent()">Vista</button>
    </div>
  </div>`);
}

function saveStudent(){
  const name=document.getElementById('ns-n').value.trim();
  if(!name)return alert('Sláðu inn nafn');
  db.students.push({id:'s'+Date.now(),name,tel:document.getElementById('ns-t').value.trim(),kt:document.getElementById('ns-k').value.trim()});
  save();closeModal();renderNemendur();
}

function delStudent(id){
  if(!confirm('Eyða nemanda og öllum tímum?'))return;
  db.students=db.students.filter(s=>s.id!==id);
  db.slots=db.slots.filter(s=>s.studentId!==id);
  save();renderNemendur();
}

function openDetail(id){
  const st=db.students.find(x=>x.id===id);if(!st)return;
  const slots=db.slots.filter(s=>s.studentId===id&&s.done);
  const mins=slots.reduce((a,s)=>a+s.duration,0);
  const pct=Math.min(100,Math.round(mins/REQ*100));
  const by={};slots.forEach(s=>{by[s.type]=(by[s.type]||0)+s.duration;});
  const now=new Date();
  const next=db.slots.filter(s=>s.studentId===id&&!s.done&&new Date(s.date+'T'+s.time)>=now).sort((a,b)=>new Date(a.date+'T'+a.time)-new Date(b.date+'T'+b.time))[0];
  const tel=st.tel?st.tel.replace(/[\s-]/g,''):'';
  openModal(`<div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar" style="width:48px;height:48px;font-size:15px">${initials(st.name)}</div>
      <div><div style="font-size:17px;font-weight:700">${st.name}</div>${st.tel?`<div style="font-size:13px;color:var(--text2)">${st.tel}</div>`:''}</div>
    </div>
    <div class="progress-bar" style="height:8px;margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px">${mins} mín / ${REQ} mín · ${pct}% lokið</div>
    ${Object.entries(by).map(([t,m])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">${t}</span><span style="font-weight:600">${m} mín</span></div>`).join('')}
    ${next&&tel?`<div style="margin-top:16px;padding:12px;background:var(--blue-bg);border-radius:var(--radius)">
      <div style="font-size:12px;color:var(--blue-text);font-weight:600;margin-bottom:8px">Næsti tími: ${fmtD(next.date)} kl. ${next.time}</div>
      <a href="sms:${tel}?body=${encodeURIComponent(buildMsg(st,next,'standard'))}" class="btn btn-sms btn-sm" style="text-decoration:none">Senda SMS áminning</a>
    </div>`:''}
    <button class="btn btn-full" style="margin-top:14px" onclick="closeModal()">Loka</button>
  </div>`);
}

function openAddSlot(){
  const opts=db.students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if(!opts)return alert('Bættu við nemanda fyrst');
  openModal(`<div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Skrá tíma</div>
    <div class="form-group"><label>Nemandi</label><select id="sl-st">${opts}</select></div>
    <div class="form-row">
      <div class="form-group"><label>Dagsetning</label><input id="sl-d" type="date" value="${todayStr()}"></div>
      <div class="form-group"><label>Klukkan</label><input id="sl-t" type="time" value="09:00"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Tegund</label><select id="sl-ty">${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label>Mínútur</label><input id="sl-dur" type="number" value="60" min="15" max="300" step="15"></div>
    </div>
    <div class="form-group"><label>Athugasemd</label><input id="sl-note" type="text" placeholder="Valfrjálst..."></div>
    <div class="form-group">
      <div class="checkbox-row"><input id="sl-done" type="checkbox"><label for="sl-done">Merkja sem kláraðan núna</label></div>
    </div>
    <div class="form-group">
      <div class="checkbox-row"><input id="sl-sms" type="checkbox" checked><label for="sl-sms">Senda SMS eftir skráningu</label></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
      <button class="btn" onclick="closeModal()">Hætta við</button>
      <button class="btn btn-primary" onclick="saveSlot()">Vista</button>
    </div>
  </div>`);
}

function saveSlot(){
  const sid=document.getElementById('sl-st').value;
  const date=document.getElementById('sl-d').value;
  const time=document.getElementById('sl-t').value;
  const type=document.getElementById('sl-ty').value;
  const dur=parseInt(document.getElementById('sl-dur').value)||60;
  const note=document.getElementById('sl-note').value;
  const done=document.getElementById('sl-done').checked;
  const sms=document.getElementById('sl-sms').checked;
  if(!date||!time)return alert('Fylltu út dagsetningu og tíma');
  const s={id:'t'+Date.now(),studentId:sid,date,time,type,duration:dur,note,done};
  db.slots.push(s);save();closeModal();renderTimar();renderYfirlit();
  if(sms&&!done){
    const st=db.students.find(x=>x.id===sid);
    if(st&&st.tel){
      const tel=st.tel.replace(/[\s-]/g,'');
      setTimeout(()=>{window.location.href=`sms:${tel}?body=${encodeURIComponent(buildMsg(st,s,'standard'))}`;},400);
    }
  }
}

function markDone(id){const s=db.slots.find(x=>x.id===id);if(s){s.done=true;save();renderTimar();renderYfirlit();renderNemendur();}}
function delSlot(id){if(!confirm('Eyða tíma?'))return;db.slots=db.slots.filter(s=>s.id!==id);save();renderTimar();renderYfirlit();}

// PWA Service Worker
if('serviceWorker' in navigator){
  const sw=`
self.addEventListener('install',e=>self.skipWaiting());
self.addEventListener('activate',e=>clients.claim());
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(e.request.url.includes(self.location.origin)){
      const c=res.clone();
      caches.open('okukennari-v1').then(cache=>cache.put(e.request,c));
    }
    return res;
  })));
});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

renderYfirlit();
</script>
